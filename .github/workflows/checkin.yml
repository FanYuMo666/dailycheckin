name: DailyCheckIn

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dailycheckin --upgrade

      - name: Run dailycheckin
        env:
          DAILYCHECKIN_CONFIG: ${{ secrets.DAILYCHECKIN_CONFIG }}
        run: |
          # 1. 强行生成配置文件到当前目录
          echo "$DAILYCHECKIN_CONFIG" > config.json
          
          # 2. 用 Python 脚本直接调用工具包，避开命令行参数 Bug
          python3 -c "from dailycheckin.main import checkin; import json; checkin(json.loads(open('config.json').read()), ['QQ'])"
