name: DailyCheckIn

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dailycheckin --upgrade

      - name: Run dailycheckin
        env:
          # 这一行是关键：只要这个环境变量名对上，工具会自动读取
          DAILYCHECKIN_CONFIG: ${{ secrets.DAILYCHECKIN_CONFIG }}
        run: |
          # 既然函数签名变了，我们直接用官方命令行触发，它会自动识别 ENV 变量
          dailycheckin --include QQ
